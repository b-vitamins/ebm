# .pre-commit-config.yaml
repos:
  # ---------- local hooks ----------
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff check --fix
        language: system
        types: [python]
        pass_filenames: true
      
      - id: mypy
        name: mypy
        entry: mypy --strict
        language: system
        types: [python]
        pass_filenames: true
      
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        pass_filenames: false
        always_run: true
        types: [python]
        verbose: true